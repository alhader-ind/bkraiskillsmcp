name = "bkraiskillsmcp"
compatibility_date = "2026-04-28"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = "dist"

[vars]
# Add public environment variables here
VITE_APP_ENV = "production"
RATE_LIMIT = 100
API_KEY = "dev_secret_key" # Replace in prod with wrangler secret put API_KEY

# Phase 3: Cloudflare Workers AI Binding
[ai]
binding = "AI"

# Phase 3: Cloudflare Analytics Engine
[[analytics_engine_datasets]]
binding = "SKILLS_USAGE"
dataset = "skills_usage"

